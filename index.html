<!DOCTYPE html>
<html lang="id">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>PPC Quality & Traceability</title>

<script src="https://unpkg.com/html5-qrcode"></script>
<script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>

<style>

body{
font-family:Segoe UI;
background:#0f172a;
color:white;
margin:0;
padding:15px;
}

.container{
max-width:520px;
margin:auto;
}

h1{
text-align:center;
color:#38bdf8;
}

.card{
background:#1e293b;
padding:20px;
border-radius:14px;
margin-bottom:20px;
}

input,button{
width:100%;
padding:14px;
margin-top:10px;
border-radius:10px;
border:none;
font-size:16px;
}

input{
background:#334155;
color:white;
}

button{
background:#38bdf8;
font-weight:bold;
cursor:pointer;
}

#reader{
margin-top:10px;
}

#result{
margin-top:15px;
padding:18px;
border-radius:14px;
text-align:center;
display:none;
}

.green{
background:#065f46;
border:2px solid #10b981;
display:block!important;
}

.red{
background:#7f1d1d;
border:2px solid #ef4444;
display:block!important;
}

table{
width:100%;
border-collapse:collapse;
font-size:13px;
}

th,td{
padding:10px;
border-bottom:1px solid #334155;
}

video{
width:100%;
border-radius:10px;
margin-top:10px;
}

</style>
</head>

<body>

<div class="container">

<h1>PPC Quality & Traceability</h1>

<div class="card">

<input id="manual" placeholder="Input Barcode / LOT">
<button onclick="processCode(document.getElementById('manual').value)">Submit</button>

<hr style="margin:20px 0;border-top:1px solid #334155">

<button onclick="startCamera()">Scan Barcode / QR</button>

<div id="reader"></div>

<hr style="margin:20px 0;border-top:1px solid #334155">

<button onclick="startOCRCamera()">Scan LOT dari Kamera (OCR)</button>

<video id="video" autoplay playsinline></video>
<button onclick="scanLotOCR()">Ambil Tulisan LOT</button>

</div>

<div id="result"></div>

<h3>Riwayat Scan</h3>

<table>

<thead>
<tr>
<th>Waktu</th>
<th>Kode</th>
<th>Status</th>
</tr>
</thead>

<tbody id="history"></tbody>

</table>

</div>


<script>

const letters="ABCDEFGHJKLMNPQRSTUVWXYZ"
const monthLetters="ABCDEFGHJKLM"

function decodeLot(code){

code=code.toUpperCase()

if(code.length<7)return null

let yearCode=code[3]+code[4]
let monthCode=code[5]+code[6]

let y1=letters.indexOf(yearCode[0])
let y2=parseInt(yearCode[1])

let year=2020+y2

let m1=parseInt(monthCode[0])
let m2=letters.indexOf(monthCode[1])

let month=m1*10+m2

if(month>12||month<1)return null

return{
year:year,
month:month,
date:new Date(year,month-1,1),
area:"PM"
}

}

function diff(date){

let now=new Date()

let months=(now.getFullYear()-date.getFullYear())*12+(now.getMonth()-date.getMonth())

let days=Math.floor((now-date)/86400000)%30

return months+" bulan "+days+" hari"

}

function processCode(code){

const data=decodeLot(code)

const resultDiv=document.getElementById("result")

if(!data){

alert("LOT tidak valid")

return

}

let now=new Date()

let months=(now.getFullYear()-data.year)*12+(now.getMonth()+1-data.month)

let expired=months>=2

let status=expired?"EXPIRED / HOLD":"OK - DAPAT DIKIRIM"

resultDiv.className=expired?"red":"green"

resultDiv.innerHTML=

`
<h2>${status}</h2>

<p>

<strong>Kode:</strong> ${code}<br>

<strong>Area:</strong> ${data.area}<br>

<strong>Produksi:</strong> ${data.month}/${data.year}<br>

<strong>Umur:</strong> ${diff(data.date)}

</p>
`

saveHistory(code,status)

document.getElementById("manual").value=""

}

function saveHistory(code,status){

let h=JSON.parse(localStorage.getItem("hist")||"[]")

h.unshift({

time:new Date().toLocaleString("id-ID"),

code,

status

})

if(h.length>50)h.pop()

localStorage.setItem("hist",JSON.stringify(h))

render()

}

function render(){

let h=JSON.parse(localStorage.getItem("hist")||"[]")

document.getElementById("history").innerHTML=

h.map(r=>`

<tr>

<td>${r.time}</td>

<td>${r.code}</td>

<td style="color:${r.status.includes("OK")?"#10b981":"#ef4444"}">${r.status}</td>

</tr>

`).join("")

}

let scanner

async function startCamera(){

if(scanner)await scanner.clear()

scanner=new Html5Qrcode("reader")

scanner.start(

{facingMode:"environment"},

{fps:15,qrbox:{width:280,height:120}},

(text)=>{

processCode(text)

scanner.stop()

}

)

}


let stream

async function startOCRCamera(){

stream=await navigator.mediaDevices.getUserMedia({

video:{facingMode:{ideal:"environment"}}

})

const video=document.getElementById("video")

video.srcObject=stream

video.play()

}

async function scanLotOCR(){

const video=document.getElementById("video")

const canvas=document.createElement("canvas")

canvas.width=video.videoWidth

canvas.height=video.videoHeight

const ctx=canvas.getContext("2d")

ctx.drawImage(video,0,0)

const result=await Tesseract.recognize(canvas,"eng")

let text=result.data.text.replace(/[^A-Z0-9]/g,"")

let lot=text.match(/[A-Z0-9]{10,}/)

if(lot){

processCode(lot[0])

}else{

alert("Tulisan LOT tidak terbaca")

}

}

render()

</script>

</body>
    </html>
