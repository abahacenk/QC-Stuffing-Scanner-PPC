<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>PPC Quality & Traceability</title>

<script src="https://unpkg.com/html5-qrcode"></script>

<style>

body{
font-family:Arial, sans-serif;
margin:0;
background:#0f172a;
color:white;
}

.container{
max-width:500px;
margin:auto;
padding:20px;
}

h1{
text-align:center;
margin-bottom:20px;
}

input,button{
width:100%;
padding:14px;
margin-top:10px;
border-radius:10px;
border:none;
font-size:16px;
}

input{
background:#334155;
color:white;
}

button{
background:#38bdf8;
font-weight:bold;
cursor:pointer;
}

hr{
margin:20px 0;
border:1px solid #334155;
}

#reader{
margin-top:10px;
}

#result{
margin-top:15px;
padding:18px;
border-radius:14px;
text-align:center;
display:none;
}

.green{
background:#065f46;
border:2px solid #10b981;
display:block !important;
}

.red{
background:#7f1d1d;
border:2px solid #ef4444;
display:block !important;
}

table{
width:100%;
border-collapse:collapse;
font-size:13px;
margin-top:20px;
}

th,td{
padding:10px;
border-bottom:1px solid #334155;
text-align:left;
}

.history-btn{
background:#6366f1;
}

.clear-btn{
background:#ef4444;
}

</style>
</head>

<body>

<div class="container">

<h1>PPC Quality & Traceability</h1>

<input id="inputCode" placeholder="Input Barcode / LOT">

<button onclick="processCode()">Submit</button>

<hr>

<button onclick="startScanner()">Scan Barcode / QR</button>

<div id="reader"></div>

<div id="result"></div>

<button class="history-btn" onclick="showHistory()">View History</button>

<button class="clear-btn" onclick="clearHistory()">Clear History</button>

<div id="historyTable"></div>

</div>

<script>

let scanner

function startScanner(){

scanner = new Html5Qrcode("reader")

scanner.start(
{ facingMode: "environment" },
{ fps:10, qrbox:250 },
decoded => {

document.getElementById("inputCode").value = decoded
processCode()
scanner.stop()

})

}

function processCode(){

let code=document.getElementById("inputCode").value.trim()

if(!code) return

processLot(code)

}

function processLot(lot){

let areaCode = lot[0]

let yearCode = lot.substring(3,5)
let monthCode = lot.substring(5,7)

let area = decodeArea(areaCode)

let year = decodeYear(yearCode)
let month = decodeMonth(monthCode)

let resultBox=document.getElementById("result")

resultBox.innerHTML = `
<b>LOT</b><br>${lot}<br><br>
<b>AREA</b><br>${area}<br><br>
<b>PRODUKSI</b><br>${month} / ${year}
`

resultBox.className="green"

saveHistory(lot,area,year,month)

}

function decodeArea(code){

let alphabet="ABCDEFGHIJKLMNOPQRSTUVWXYZ"

let num = alphabet.indexOf(code)

if(num<0) return "Unknown"

return "PM"+num

}

function decodeYear(code){

let map={
"2F":"2025",
"2E":"2024",
"2D":"2023"
}

return map[code] || code

}

function decodeMonth(code){

let map={
"1A":"October",
"1B":"November",
"1C":"December"
}

return map[code] || code

}

function saveHistory(lot,area,year,month){

let history=JSON.parse(localStorage.getItem("scanHistory")||"[]")

history.push({
lot:lot,
area:area,
year:year,
month:month,
time:new Date().toLocaleString()
})

localStorage.setItem("scanHistory",JSON.stringify(history))

}

function showHistory(){

let history=JSON.parse(localStorage.getItem("scanHistory")||"[]")

let html="<table><tr><th>LOT</th><th>AREA</th><th>YEAR</th><th>MONTH</th><th>TIME</th></tr>"

history.forEach(h=>{

html+=`
<tr>
<td>${h.lot}</td>
<td>${h.area}</td>
<td>${h.year}</td>
<td>${h.month}</td>
<td>${h.time}</td>
</tr>
`

})

html+="</table>"

document.getElementById("historyTable").innerHTML=html

}

function clearHistory(){

if(confirm("Hapus semua history?")){

localStorage.removeItem("scanHistory")

document.getElementById("historyTable").innerHTML=""

alert("History berhasil dihapus")

}

}

</script>

</body>
</html>
